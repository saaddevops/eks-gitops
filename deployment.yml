apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: user-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
      - name: user-service
        image: 318630425608.dkr.ecr.ap-south-1.amazonaws.com/user-service:latest

        ports:
        - containerPort: 5000
