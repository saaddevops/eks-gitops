apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: user-service-ingress
  namespace: user-service

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
  - http:
      paths:

      - path: /users
        pathType: Prefix

        backend:
          service:
            name: user-service

            port:
              number: 80